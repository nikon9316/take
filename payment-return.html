<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Возврат после оплаты</title>
  <link rel="stylesheet" href="styles.css" />
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>
  <div id="app">
    <main class="screen active">
      <section class="restaurant-card" style="margin-top:40px;">
        <div class="restaurant-card-right">
          <div class="restaurant-card-title">Оплата завершена</div>
          <p class="product-desc" id="paymentReturnText">Вы можете вернуться в Telegram. Если оплата прошла успешно, статус заказа обновится автоматически.</p>
          <button class="checkout-btn" style="margin-top:16px;" onclick="closeMiniApp()">
            <span>Вернуться в Telegram</span>
            <span>↩</span>
          </button>
        </div>
      </section>
    </main>
  </div>
  <script>
    const tg = window.Telegram.WebApp;
    tg.ready();
    function closeMiniApp() {
      tg.close();
    }
    const params = new URLSearchParams(window.location.search);
    const orderId = params.get('order_id');
    if (orderId) {
      document.getElementById('paymentReturnText').textContent = `Вы можете вернуться в Telegram. Заказ #${orderId} создан. Если оплата прошла успешно, статус оплаты обновится автоматически.`;
    }
  </script>
</body>
</html>
